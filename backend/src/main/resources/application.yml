server:
  port: ${PORT:8080}

spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          max-tokens: 2200
          temperature: 0.2

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost}

job-fetcher:
  timeout-seconds: ${JOB_FETCHER_TIMEOUT_SECONDS:15}
  retry:
    max-attempts: ${JOB_FETCHER_RETRY_MAX_ATTEMPTS:3}
    backoff-ms: ${JOB_FETCHER_RETRY_BACKOFF_MS:400}

security:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:30}

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
