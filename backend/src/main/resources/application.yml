server:
  port: ${PORT:8080}

spring:
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${GROQ_API_KEY}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:llama-3.3-70b-versatile}
          max-tokens: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MAX_TOKENS:4000}
          temperature: 0.2
          response-format:
            type: json_object

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost}

job-fetcher:
  timeout-seconds: ${JOB_FETCHER_TIMEOUT_SECONDS:15}
  retry:
    max-attempts: ${JOB_FETCHER_RETRY_MAX_ATTEMPTS:3}
    backoff-ms: ${JOB_FETCHER_RETRY_BACKOFF_MS:400}

security:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:30}

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health

api:
  gemini-key: ${GEMINI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
  groq-key: ${GROQ_API_KEY:}
  gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}
  groq-model: ${GROQ_MODEL:llama-3.3-70b-versatile}
