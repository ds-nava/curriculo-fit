version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-30}
      - JOB_FETCHER_TIMEOUT_SECONDS=${JOB_FETCHER_TIMEOUT_SECONDS:-15}
      - JOB_FETCHER_RETRY_MAX_ATTEMPTS=${JOB_FETCHER_RETRY_MAX_ATTEMPTS:-3}
      - JOB_FETCHER_RETRY_BACKOFF_MS=${JOB_FETCHER_RETRY_BACKOFF_MS:-400}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
